<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innova Labs | Especialización SIG</title>

<!-- 🔥 FAVICON -->
<link rel="icon" type="image/png" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #101e37;
  color: white;
}

/* HERO */
.hero {
  padding: 50px 20px;
  text-align: center;
}

.hero img {
  width: 130px;
  margin-bottom: 15px;
}

.hero h1 {
  color: #03d19b;
  font-size: 28px;
  margin-bottom: 10px;
}

.hero p {
  max-width: 500px;
  margin: auto;
  opacity: 0.85;
}

/* CARD */
.card {
  background: white;
  color: black;
  margin: 20px auto;
  padding: 25px;
  border-radius: 14px;
  text-align: center;
  max-width: 500px;
}

input, button, textarea {
  width: 100%;
  max-width: 320px;
  padding: 12px;
  margin: 10px auto;
  border-radius: 8px;
  border: none;
  display: block;
  font-family: 'Poppins', sans-serif;
}

button {
  background: #03d19b;
  font-weight: 600;
  cursor: pointer;
}

textarea {
  height: 140px;
  resize: none;
}

/* CANVAS */
canvas {
  display: none;
  margin: 20px auto;
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
}
</style>
</head>

<body>

<section class="hero">
  <img src="logo.png" onerror="this.style.display='none'">
  <h1>Programa de Especialización en SIG</h1>
  <p>Aplicado a Ecología y Conservación · Innova Labs</p>
</section>

<section class="card">

  <h3>Sube tu foto</h3>

  <input type="file" id="upload" accept="image/*">
  <button onclick="draw()">Generar flyer</button>

  <canvas id="canvas" width="1080" height="1080"></canvas>

  <button onclick="download()">Descargar</button>

</section>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();
let overlay = new Image();
overlay.src = "overlay.png";

let scale = 1;
let posX = 0;
let posY = 0;

let dragging = false;
let startX, startY;
let lastDist = null;
let imageLoaded = false;

// SUBIR IMAGEN
document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  img.src = URL.createObjectURL(file);

  img.onload = () => {
    imageLoaded = true;

    const scaleX = canvas.width / img.width;
    const scaleY = canvas.height / img.height;
    scale = Math.max(scaleX, scaleY);

    const imgWidth = img.width * scale;
    const imgHeight = img.height * scale;

    posX = (canvas.width - imgWidth) / 2;
    posY = (canvas.height - imgHeight) / 2;
  };
});

// GENERAR
function draw(){
  if (!imageLoaded) return;

  canvas.style.display = "block";

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const imgWidth = img.width * scale;
  const imgHeight = img.height * scale;

  ctx.drawImage(img, posX, posY, imgWidth, imgHeight);
  ctx.drawImage(overlay, 0, 0, canvas.width, canvas.height);
}

// ZOOM (PC)
canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  scale += e.deltaY * -0.001;
  scale = Math.min(Math.max(0.5, scale), 4);
  draw();
});

// DRAG (PC)
canvas.addEventListener("mousedown", (e) => {
  dragging = true;
  startX = e.offsetX - posX;
  startY = e.offsetY - posY;
});

canvas.addEventListener("mousemove", (e) => {
  if(dragging){
    posX = e.offsetX - startX;
    posY = e.offsetY - startY;

    const imgWidth = img.width * scale;
    const imgHeight = img.height * scale;

    posX = Math.min(0, Math.max(posX, canvas.width - imgWidth));
    posY = Math.min(0, Math.max(posY, canvas.height - imgHeight));

    draw();
  }
});

canvas.addEventListener("mouseup", () => dragging = false);
canvas.addEventListener("mouseleave", () => dragging = false);

// TOUCH
canvas.addEventListener("touchstart", (e) => {
  if (e.touches.length === 1) {
    startX = e.touches[0].clientX - posX;
    startY = e.touches[0].clientY - posY;
  }
  if (e.touches.length === 2) {
    lastDist = getDistance(e.touches);
  }
});

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();

  if (e.touches.length === 1) {
    posX = e.touches[0].clientX - startX;
    posY = e.touches[0].clientY - startY;

    const imgWidth = img.width * scale;
    const imgHeight = img.height * scale;

    posX = Math.min(0, Math.max(posX, canvas.width - imgWidth));
    posY = Math.min(0, Math.max(posY, canvas.height - imgHeight));

    draw();
  }

  if (e.touches.length === 2) {
    let newDist = getDistance(e.touches);
    scale += (newDist - lastDist) * 0.005;
    scale = Math.min(Math.max(0.5, scale), 4);
    lastDist = newDist;
    draw();
  }
}, { passive: false });

function getDistance(touches) {
  let dx = touches[0].clientX - touches[1].clientX;
  let dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

// DESCARGAR
function download(){
  const link = document.createElement("a");
  link.download = "flyer.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
